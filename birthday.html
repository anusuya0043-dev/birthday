<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff4d6d,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
text-align:center;
color:white;
overflow:hidden;
}

h1{
margin-top:60px;
font-size:45px;
animation:glow 2s infinite alternate;
}

p{
font-size:24px;
padding:20px;
}

img{
width:220px;
height:220px;
border-radius:50%;
border:6px solid white;
margin-top:20px;
object-fit:cover;
box-shadow:0 0 20px white;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#ff3366;
cursor:pointer;
margin-top:20px;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px yellow;}
}

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday My Purusha ❤️</h1>

<!-- PHOTO -->
<img src="bday.png">

<p>
💖 I Love You So Much 💖<br><br>

Nee dhan en life la biggest happiness. 🥹❤️<br>
Distance namma rendu perukum oru test dhaan...<br>
Aana namma love adha vida strong. 💞<br><br>

Happy Birthday My Whole World 🌍❤️<br>
Forever Yours... 😘💖
</p>

<button onclick="wish()">🎁 Click Here 🎁</button>

<script>
function wish(){
alert("🎉 Happy Birthday My Purusha ❤️\n\nI Love You Forever 🥹💖");
}

for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
}
</script>

</body>
</html>
